<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#3a2c1c"/>
      <stop offset="55%" stop-color="#16110b"/>
      <stop offset="100%" stop-color="#0c0805"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- warm dust background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- soft amber glow behind the crystal -->
  <ellipse cx="256" cy="262" rx="120" ry="160" fill="#e0a94b" opacity="0.22" filter="url(#glow)"/>

  <!-- crystal point (a Stranded crystal): two faces, faceted top -->
  <!-- left face -->
  <path d="M256 118 L196 214 L196 392 L256 412 Z" fill="#c8923d"/>
  <!-- right face -->
  <path d="M256 118 L316 214 L316 392 L256 412 Z" fill="#e0a94b"/>
  <!-- top-left facet -->
  <path d="M256 118 L196 214 L256 214 Z" fill="#e7b865"/>
  <!-- top-right facet -->
  <path d="M256 118 L316 214 L256 214 Z" fill="#b07f33"/>

  <!-- facet edges -->
  <g stroke="#160f06" stroke-width="6" stroke-linejoin="round" fill="none" opacity="0.55">
    <path d="M256 118 L196 214 L196 392 L256 412 L316 392 L316 214 Z"/>
    <path d="M256 118 L256 412"/>
    <path d="M196 214 L316 214"/>
  </g>

  <!-- subtle inner highlight -->
  <path d="M256 132 L236 210 L256 210 Z" fill="#f3d79a" opacity="0.7"/>
</svg>
